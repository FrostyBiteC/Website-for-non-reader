<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Reading - Kids Learning</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #ffd3e1 0%, #ff9eb5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logo-image {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 50%;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b6b;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            color: #666;
            font-weight: 300;
        }

        .passages-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 40px;
        }

        .passage-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-left: 6px solid #ff9eb5;
            transition: all 0.3s ease;
        }

        .passage-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .passage-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .passage-icon {
            font-size: 2.5rem;
        }

        .passage-title {
            font-size: 1.6rem;
            color: #2c3e50;
            font-weight: 700;
        }

        .passage-content {
            font-size: 1.15rem;
            line-height: 2;
            color: #444;
            margin-bottom: 20px;
        }

        .passage-content .word {
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .passage-content .word:hover {
            background: rgba(255, 158, 181, 0.3);
        }

        .passage-content .word.highlighted {
            background: linear-gradient(120deg, #ffecd2 0%, #fcb69f 100%);
            font-weight: 600;
        }

        .read-aloud-btn {
            background: linear-gradient(135deg, #ff9eb5 0%, #ff6b6b 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(255, 158, 181, 0.4);
        }

        .read-aloud-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 158, 181, 0.5);
        }

        .read-aloud-btn:active {
            transform: translateY(0);
        }

        .read-aloud-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .back-button {
            display: block;
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(108, 117, 125, 0.4);
            width: fit-content;
            margin: 0 auto;
        }

        .back-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(108, 117, 125, 0.5);
        }

        .instruction {
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
            border-left: 5px solid #9c27b0;
        }

        .instruction p {
            font-size: 1.1rem;
            color: #7b1fa2;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .logo-text {
                font-size: 1.5rem;
            }

            .passage-card {
                padding: 20px;
            }

            .passage-title {
                font-size: 1.3rem;
            }

            .passage-content {
                font-size: 1rem;
            }

            .passage-icon {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px;
                border-radius: 20px;
            }

            .header h1 {
                font-size: 1.7rem;
            }

            .passage-title {
                font-size: 1.2rem;
            }

            .passage-content {
                font-size: 0.95rem;
                line-height: 1.8;
            }

            .read-aloud-btn {
                padding: 10px 20px;
                font-size: 0.95rem;
            }

            .back-button {
                padding: 12px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="../cropped_circle_image.png" alt="Edulift Logo" class="logo-image">
                <span class="logo-text">EDULIFT</span>
            </div>
            <h1>📖 English Reading</h1>
            <p>Read fun stories and improve your English!</p>
        </div>

        <div class="instruction">
            <p>🔊 Click the "Read Aloud" button to hear the story!</p>
        </div>

        <div class="passages-container" id="passagesContainer">
            <!-- Passages will be generated by JavaScript -->
        </div>

        <a href="index.html" class="back-button">← Back to Reading</a>
    </div>

    <script>
        // English reading passages
        const englishPassages = [
            {
                id: 1,
                title: 'My Family',
                icon: '👨‍👩‍👧‍👦',
                content: 'My name is Tom. I have a happy family. My father is kind and hardworking. He works as a teacher. My mother is loving and caring. She cooks delicious food for us. I have a sister named Lucy. We love to play games together. We watch movies every Saturday night. I love my family very much.'
            },
            {
                id: 2,
                title: 'My Pet Dog',
                icon: '🐕',
                content: 'I have a pet dog named Max. He is brown and white. Max is very friendly and playful. He likes to run in the park and chase balls. Every morning, we go for a walk together. He wags his tail when he sees me. Max is my best friend. I take good care of him every day.'
            },
            {
                id: 3,
                title: 'My School',
                icon: '🏫',
                content: 'I go to Sunshine Elementary School. It is a big and beautiful school. There are many classrooms and a large playground. My teacher is Mrs. Smith. She is kind and teaches well. I have many friends at school. We learn math, reading, and science. I enjoy going to school every day.'
            },
            {
                id: 4,
                title: 'A Day at the Beach',
                icon: '🏖️',
                content: 'Last summer, my family went to the beach. The sun was shining and the sky was blue. I built sandcastles with my sister. We collected shells along the shore. My father taught me how to swim. We ate sandwiches and fruits for lunch. It was a wonderful day. I cannot wait to go back!'
            },
            {
                id: 5,
                title: 'The Little Bird',
                icon: '🐦',
                content: 'Once upon a time, there was a little bird. It had bright yellow feathers. The bird lived in a tree near my window. Every morning, it sang beautiful songs. I fed it seeds and water. The bird became my friend. One day, it flew away with its family. I hope it comes back soon.'
            },
            {
                id: 6,
                title: 'My Favorite Food',
                icon: '🍕',
                content: 'My favorite food is pizza. It has cheese, tomato sauce, and toppings. I like pepperoni pizza the best. My mother makes pizza every Friday. The kitchen smells so good when she bakes. We eat pizza together as a family. It is hot and tasty. Pizza makes me happy!'
            },
            {
                id: 7,
                title: 'The Rainy Day',
                icon: '🌧️',
                content: 'It was a rainy day yesterday. The sky was gray and cloudy. Raindrops fell on the windows. I stayed inside and read books. My mother made hot chocolate for me. We played board games together. Later, I saw a rainbow outside. Rainy days can be fun too!'
            },
            {
                id: 8,
                title: 'My Birthday Party',
                icon: '🎂',
                content: 'Yesterday was my birthday. I turned eight years old. My parents threw a party for me. My friends came to celebrate. We played games and ate cake. I got many wonderful gifts. Everyone sang happy birthday to me. It was the best day ever. I felt so special and loved.'
            }
        ];

        // Generate passage cards
        const passagesContainer = document.getElementById('passagesContainer');
        let currentUtterance = null;
        let currentHighlightInterval = null;

        englishPassages.forEach(passage => {
            const card = document.createElement('div');
            card.className = 'passage-card';
            card.dataset.id = passage.id;

            // Wrap words in spans for highlighting
            const words = passage.content.split(' ');
            const wrappedContent = words.map((word, index) => 
                `<span class="word" data-index="${index}">${word}</span>`
            ).join(' ');

            card.innerHTML = `
                <div class="passage-header">
                    <div class="passage-icon">${passage.icon}</div>
                    <h2 class="passage-title">${passage.title}</h2>
                </div>
                <div class="passage-content" id="content-${passage.id}">
                    ${wrappedContent}
                </div>
                <button class="read-aloud-btn" data-id="${passage.id}">
                    🔊 Read Aloud
                </button>
            `;

            passagesContainer.appendChild(card);
        });

        // Add event listeners to read aloud buttons
        document.querySelectorAll('.read-aloud-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const passageId = parseInt(btn.dataset.id);
                const passage = englishPassages.find(p => p.id === passageId);
                const contentDiv = document.getElementById(`content-${passageId}`);
                const words = contentDiv.querySelectorAll('.word');

                if (btn.textContent.includes('Read Aloud')) {
                    readPassage(passage, btn, words);
                } else {
                    stopReading(btn, words);
                }
            });
        });

        // Read passage with word highlighting
        function readPassage(passage, btn, words) {
            if (!('speechSynthesis' in window)) {
                alert('Sorry, speech synthesis is not available in your browser.');
                return;
            }

            // Stop any current speech
            window.speechSynthesis.cancel();
            clearInterval(currentHighlightInterval);

            // Update button
            btn.innerHTML = '⏹️ Stop';

            // Create utterance
            const utterance = new SpeechSynthesisUtterance(passage.content);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            utterance.pitch = 1.05;

            // Track word boundaries for highlighting
            let wordIndex = 0;

            utterance.onstart = () => {
                wordIndex = 0;
                highlightWord(words, 0);

                currentHighlightInterval = setInterval(() => {
                    wordIndex++;
                    if (wordIndex < words.length) {
                        highlightWord(words, wordIndex);
                    }
                }, 350); // Approximate timing per word
            };

            utterance.onend = () => {
                stopReading(btn, words);
            };

            utterance.onerror = () => {
                stopReading(btn, words);
            };

            currentUtterance = utterance;
            window.speechSynthesis.speak(utterance);
        }

        // Stop reading
        function stopReading(btn, words) {
            window.speechSynthesis.cancel();
            clearInterval(currentHighlightInterval);
            btn.innerHTML = '🔊 Read Aloud';
            words.forEach(word => word.classList.remove('highlighted'));
        }

        // Highlight current word
        function highlightWord(words, index) {
            words.forEach(word => word.classList.remove('highlighted'));
            if (words[index]) {
                words[index].classList.add('highlighted');
                words[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // Stop speech when leaving page
        window.addEventListener('beforeunload', () => {
            window.speechSynthesis.cancel();
            clearInterval(currentHighlightInterval);
        });
    </script>
</body>
</html>
