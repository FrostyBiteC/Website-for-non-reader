<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abakada - Filipino Alphabet</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logo-image {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 50%;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b6b;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            color: #666;
            font-weight: 300;
        }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .letter-card {
            background: white;
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 3px solid transparent;
        }

        .letter-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .letter-card:active {
            transform: translateY(-4px) scale(0.98);
        }

        .letter-card.speaking {
            border-color: #ff6b6b;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe0e0 100%);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translateY(-8px) scale(1.02); }
            50% { transform: translateY(-8px) scale(1.05); }
        }

        .letter-display {
            font-size: 3.5rem;
            font-weight: 700;
            color: #e17055;
            margin-bottom: 10px;
            line-height: 1;
        }

        .letter-word {
            font-size: 1.2rem;
            color: #2d3436;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .letter-pronunciation {
            font-size: 0.95rem;
            color: #636e72;
            font-style: italic;
        }

        .letter-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .back-button {
            display: block;
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(108, 117, 125, 0.4);
            width: fit-content;
            margin: 0 auto;
        }

        .back-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(108, 117, 125, 0.5);
        }

        .instruction {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
            border-left: 5px solid #4caf50;
        }

        .instruction p {
            font-size: 1.1rem;
            color: #2e7d32;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .logo-text {
                font-size: 1.5rem;
            }

            .alphabet-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 15px;
            }

            .letter-card {
                padding: 20px 12px;
            }

            .letter-display {
                font-size: 2.8rem;
            }

            .letter-word {
                font-size: 1rem;
            }

            .letter-icon {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px;
                border-radius: 20px;
            }

            .header h1 {
                font-size: 1.7rem;
            }

            .alphabet-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .letter-display {
                font-size: 2.5rem;
            }

            .letter-word {
                font-size: 0.95rem;
            }

            .back-button {
                padding: 12px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="../cropped_circle_image.png" alt="Edulift Logo" class="logo-image">
                <span class="logo-text">EDULIFT</span>
            </div>
            <h1>🔤 Abakada</h1>
            <p>Learn the traditional Filipino alphabet!</p>
        </div>

        <div class="instruction">
            <p>👆 Click on any letter to hear its sound!</p>
        </div>

        <div class="alphabet-grid" id="alphabetGrid">
            <!-- Letter cards will be generated by JavaScript -->
        </div>

        <a href="index.html" class="back-button">← Back to Reading</a>
    </div>

    <script>
        // Abakada alphabet data with Filipino words
        const abakadaData = [
            { letter: 'A', word: 'Aso', pronunciation: 'Ah-so (Dog)', icon: '🐕' },
            { letter: 'B', word: 'Bola', pronunciation: 'Bo-la (Ball)', icon: '⚽' },
            { letter: 'K', word: 'Kuko', pronunciation: 'Ku-ko (Nail)', icon: '💅' },
            { letter: 'D', word: 'Daga', pronunciation: 'Da-ga (Rat)', icon: '🐀' },
            { letter: 'E', word: 'Elepante', pronunciation: 'E-le-pan-te (Elephant)', icon: '🐘' },
            { letter: 'G', word: 'Gulong', pronunciation: 'Gu-long (Wheel)', icon: '⚙️' },
            { letter: 'H', word: 'Halo', pronunciation: 'Ha-lo (Mix)', icon: '🍧' },
            { letter: 'I', word: 'Ibon', pronunciation: 'I-bon (Bird)', icon: '🐦' },
            { letter: 'L', word: 'Lobo', pronunciation: 'Lo-bo (Balloon)', icon: '🎈' },
            { letter: 'M', word: 'Mata', pronunciation: 'Ma-ta (Eye)', icon: '👁️' },
            { letter: 'N', word: 'Noo', pronunciation: 'No-o (Forehead)', icon: '🤔' },
            { letter: 'Ng', word: 'Ngiti', pronunciation: 'Ngi-ti (Smile)', icon: '😊' },
            { letter: 'O', word: 'Oso', pronunciation: 'O-so (Bear)', icon: '🐻' },
            { letter: 'P', word: 'Pusa', pronunciation: 'Pu-sa (Cat)', icon: '🐱' },
            { letter: 'R', word: 'Rosas', pronunciation: 'Ro-sas (Rose)', icon: '🌹' },
            { letter: 'S', word: 'Saging', pronunciation: 'Sa-ging (Banana)', icon: '🍌' },
            { letter: 'T', word: 'Tala', pronunciation: 'Ta-la (Star)', icon: '⭐' },
            { letter: 'U', word: 'Ulap', pronunciation: 'U-lap (Cloud)', icon: '☁️' },
            { letter: 'W', word: 'Walis', pronunciation: 'Wa-lis (Broom)', icon: '🧹' },
            { letter: 'Y', word: 'Yoyo', pronunciation: 'Yo-yo', icon: '🪀' }
        ];

        // Generate letter cards
        const alphabetGrid = document.getElementById('alphabetGrid');
        let currentUtterance = null;
        let speakingCard = null;

        abakadaData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'letter-card';
            card.dataset.index = index;
            card.innerHTML = `
                <div class="letter-display">${item.letter}</div>
                <div class="letter-icon">${item.icon}</div>
                <div class="letter-word">${item.word}</div>
                <div class="letter-pronunciation">${item.pronunciation}</div>
            `;

            card.addEventListener('click', () => speakLetter(item, card));
            alphabetGrid.appendChild(card);
        });

        // Text-to-speech function
        function speakLetter(item, card) {
            if (!('speechSynthesis' in window)) {
                alert('Sorry, speech synthesis is not available in your browser.');
                return;
            }

            // Stop any current speech
            window.speechSynthesis.cancel();

            // Remove speaking class from previous card
            if (speakingCard) {
                speakingCard.classList.remove('speaking');
            }

            // Add speaking class to current card
            card.classList.add('speaking');
            speakingCard = card;

            // Create utterance for the letter
            const letterUtterance = new SpeechSynthesisUtterance(item.letter.toLowerCase());
            letterUtterance.lang = 'tl-PH';
            letterUtterance.rate = 0.8;
            letterUtterance.pitch = 1.1;

            // Create utterance for the word
            const wordUtterance = new SpeechSynthesisUtterance(item.word);
            wordUtterance.lang = 'tl-PH';
            wordUtterance.rate = 0.7;
            wordUtterance.pitch = 1.1;

            // When letter finishes, speak the word
            letterUtterance.onend = () => {
                window.speechSynthesis.speak(wordUtterance);
            };

            // When word finishes, remove speaking class
            wordUtterance.onend = () => {
                card.classList.remove('speaking');
                speakingCard = null;
            };

            // Handle errors
            letterUtterance.onerror = () => {
                card.classList.remove('speaking');
                speakingCard = null;
            };

            // Start speaking
            window.speechSynthesis.speak(letterUtterance);
        }

        // Stop speech when leaving page
        window.addEventListener('beforeunload', () => {
            window.speechSynthesis.cancel();
        });
    </script>
</body>
</html>
