<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Tables - Kids Learning</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logo-image {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 50%;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b6b;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            color: #666;
            font-weight: 300;
        }

        .tts-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .tts-toggle label {
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
        }

        .tts-toggle input[type="checkbox"] {
            width: 50px;
            height: 25px;
            cursor: pointer;
        }

        .tables-container {
            overflow-x: auto;
            padding: 10px;
        }

        .multiplication-table {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 4px;
            min-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .table-cell {
            padding: 15px 10px;
            text-align: center;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 1rem;
        }

        .table-cell:hover {
            transform: scale(1.15);
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Header row and column */
        .header-cell {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .header-cell:hover {
            transform: scale(1.05);
        }

        /* Color-coded rows */
        .row-1 .table-cell:not(.header-cell) { background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%); }
        .row-1 .table-cell:not(.header-cell):hover { background: linear-gradient(135deg, #ffcdd2 0%, #ef9a9a 100%); }

        .row-2 .table-cell:not(.header-cell) { background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); }
        .row-2 .table-cell:not(.header-cell):hover { background: linear-gradient(135deg, #bbdefb 0%, #90caf9 100%); }

        .row-3 .table-cell:not(.header-cell) { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); }
        .row-3 .table-cell:not(.header-cell):hover { background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%); }

        .row-4 .table-cell:not(.header-cell) { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); }
        .row-4 .table-cell:not(.header-cell):hover { background: linear-gradient(135deg, #ffe0b2 0%, #ffcc80 100%); }

        .row-5 .table-cell:not(.header-cell) { background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%); }
        .row-5 .table-cell:not(.header-cell):hover { background: linear-gradient(135deg, #f8bbd9 0%, #f48fb1 100%); }

        .row-6 .table-cell:not(.header-cell) { background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%); }
        .row-6 .table-cell:not(.header-cell):hover { background: linear-gradient(135deg, #e1bee7 0%, #ce93d8 100%); }

        .row-7 .table-cell:not(.header-cell) { background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%); }
        .row-7 .table-cell:not(.header-cell):hover { background: linear-gradient(135deg, #b2dfdb 0%, #80cbc4 100%); }

        .row-8 .table-cell:not(.header-cell) { background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%); }
        .row-8 .table-cell:not(.header-cell):hover { background: linear-gradient(135deg, #ffecb3 0%, #ffe082 100%); }

        .row-9 .table-cell:not(.header-cell) { background: linear-gradient(135deg, #efebe9 0%, #d7ccc8 100%); }
        .row-9 .table-cell:not(.header-cell):hover { background: linear-gradient(135deg, #d7ccc8 0%, #bcaaa4 100%); }

        .row-10 .table-cell:not(.header-cell) { background: linear-gradient(135deg, #e8eaf6 0%, #c5cae9 100%); }
        .row-10 .table-cell:not(.header-cell):hover { background: linear-gradient(135deg, #c5cae9 0%, #9fa8da 100%); }

        /* Column headers */
        .col-header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            color: white;
        }

        .back-button {
            display: block;
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            margin-top: 40px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(108, 117, 125, 0.4);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .back-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(108, 117, 125, 0.5);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .logo-text {
                font-size: 1.5rem;
            }

            .tables-container {
                padding: 5px;
            }

            .multiplication-table {
                gap: 3px;
                min-width: 500px;
                padding: 10px;
            }

            .table-cell {
                padding: 10px 6px;
                font-size: 0.8rem;
            }

            .header-cell {
                font-size: 0.9rem;
            }

            .back-button {
                padding: 12px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="../cropped_circle_image.png" alt="Edulift Logo" class="logo-image">
                <span class="logo-text">EDULIFT</span>
            </div>
            <h1>✖️ Multiplication Tables</h1>
            <p>Click on any equation to hear it spoken!</p>
        </div>

        <div class="tts-toggle">
            <label for="ttsEnabled">🔊 Text-to-Speech:</label>
            <input type="checkbox" id="ttsEnabled" checked>
        </div>

        <div class="tables-container">
            <div class="multiplication-table" id="multiplicationTable">
                <!-- Multiplication table will be generated by JavaScript -->
            </div>
        </div>

        <a href="arithmetic.html" class="back-button">← Back to Arithmetic</a>
    </div>

    <script>
        // Number to word conversion
        const numberToWords = (num) => {
            const ones = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
            const teens = ['ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen'];
            const tens = ['', '', 'twenty', 'thirty', 'forty', 'fifty', 'sixty', 'seventy', 'eighty', 'ninety'];

            if (num === 0) return 'zero';
            if (num < 10) return ones[num];
            if (num < 20) return teens[num - 10];
            if (num < 100) {
                return tens[Math.floor(num / 10)] + (num % 10 !== 0 ? ' ' + ones[num % 10] : '');
            }
            if (num === 100) return 'one hundred';
            return num.toString();
        };

        // Generate multiplication table
        const generateMultiplicationTable = () => {
            const table = document.getElementById('multiplicationTable');
            
            // Create header row
            const emptyCell = document.createElement('div');
            emptyCell.className = 'table-cell header-cell';
            emptyCell.textContent = '×';
            table.appendChild(emptyCell);
            
            for (let col = 1; col <= 10; col++) {
                const cell = document.createElement('div');
                cell.className = 'table-cell header-cell col-header';
                cell.textContent = col;
                table.appendChild(cell);
            }
            
            // Create data rows
            for (let row = 1; row <= 10; row++) {
                // Row header
                const rowHeader = document.createElement('div');
                rowHeader.className = 'table-cell header-cell';
                rowHeader.textContent = row;
                table.appendChild(rowHeader);
                
                // Data cells
                for (let col = 1; col <= 10; col++) {
                    const cell = document.createElement('div');
                    cell.className = `table-cell row-${row}`;
                    const product = row * col;
                    cell.textContent = product;
                    cell.dataset.equation = `${numberToWords(row)} times ${numberToWords(col)} equals ${numberToWords(product)}`;
                    cell.addEventListener('click', () => speakEquation(cell.dataset.equation));
                    table.appendChild(cell);
                }
            }
        };

        // Check if speech synthesis is available
        const isSpeechSynthesisAvailable = () => {
            return 'speechSynthesis' in window;
        };

        // Speak equation
        const speakEquation = (equation) => {
            const ttsEnabled = document.getElementById('ttsEnabled').checked;
            if (!ttsEnabled || !isSpeechSynthesisAvailable()) return;

            // Cancel any ongoing speech
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(equation);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            utterance.pitch = 1.1;

            window.speechSynthesis.speak(utterance);
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            generateMultiplicationTable();
        });
    </script>
</body>
</html>
