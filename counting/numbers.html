<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers - Kids Learning</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #a8e6cf 0%, #88d8b0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logo-image {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 50%;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b6b;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            color: #666;
            font-weight: 300;
        }

        .tts-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .tts-toggle label {
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
        }

        .tts-toggle input[type="checkbox"] {
            width: 50px;
            height: 25px;
            cursor: pointer;
        }

        .numbers-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .number-group {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .group-title {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 700;
            padding: 10px;
            background: linear-gradient(135deg, #88d8b0 0%, #a8e6cf 100%);
            border-radius: 15px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .number-card {
            background: white;
            border-radius: 15px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            border: 2px solid transparent;
        }

        .number-card:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            border-color: #88d8b0;
        }

        .number-card:active {
            transform: translateY(-2px) scale(1.02);
        }

        .number-numeral {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .number-word {
            font-size: 0.9rem;
            color: #6c757d;
            font-weight: 600;
            text-transform: capitalize;
        }

        .back-button {
            display: block;
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            margin-top: 40px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(108, 117, 125, 0.4);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .back-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(108, 117, 125, 0.5);
        }

        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #88d8b0 0%, #a8e6cf 100%);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            font-size: 1.5rem;
            border: none;
        }

        .scroll-top:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .logo-text {
                font-size: 1.5rem;
            }

            .numbers-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 10px;
            }

            .number-card {
                padding: 15px 10px;
            }

            .number-numeral {
                font-size: 1.5rem;
            }

            .number-word {
                font-size: 0.8rem;
            }

            .group-title {
                font-size: 1.2rem;
            }

            .back-button {
                padding: 12px 25px;
                font-size: 1rem;
            }

            .scroll-top {
                width: 45px;
                height: 45px;
                font-size: 1.2rem;
                bottom: 20px;
                right: 20px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px;
                border-radius: 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .logo-text {
                font-size: 1.3rem;
            }

            .numbers-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .number-card {
                padding: 12px 8px;
            }

            .number-numeral {
                font-size: 1.3rem;
            }

            .number-word {
                font-size: 0.7rem;
            }

            .group-title {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="../cropped_circle_image.png" alt="Edulift Logo" class="logo-image">
                <span class="logo-text">EDULIFT</span>
            </div>
            <h1>🔢 Numbers</h1>
            <p>Click on any number to hear it spoken!</p>
        </div>

        <div class="tts-toggle">
            <label for="ttsEnabled">🔊 Text-to-Speech:</label>
            <input type="checkbox" id="ttsEnabled" checked>
        </div>

        <div class="numbers-container" id="numbersContainer">
            <!-- Number groups will be generated by JavaScript -->
        </div>

        <a href="index.html" class="back-button">← Back to Counting</a>
    </div>

    <button class="scroll-top" id="scrollTop" title="Scroll to top">↑</button>

    <script>
        // Number to word conversion
        const numberToWords = (num) => {
            const ones = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
            const teens = ['ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen'];
            const tens = ['', '', 'twenty', 'thirty', 'forty', 'fifty', 'sixty', 'seventy', 'eighty', 'ninety'];

            if (num === 0) return 'zero';
            if (num < 10) return ones[num];
            if (num < 20) return teens[num - 10];
            if (num < 100) {
                return tens[Math.floor(num / 10)] + (num % 10 !== 0 ? '-' + ones[num % 10] : '');
            }
            if (num < 1000) {
                return ones[Math.floor(num / 100)] + ' hundred' + (num % 100 !== 0 ? ' ' + numberToWords(num % 100) : '');
            }
            return num.toString();
        };

        // Generate number groups
        const generateNumbers = () => {
            const container = document.getElementById('numbersContainer');
            const groupSize = 10;
            const totalNumbers = 100;

            for (let start = 1; start <= totalNumbers; start += groupSize) {
                const end = Math.min(start + groupSize - 1, totalNumbers);
                const groupDiv = document.createElement('div');
                groupDiv.className = 'number-group';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'group-title';
                titleDiv.textContent = `${start} - ${end}`;
                groupDiv.appendChild(titleDiv);

                const gridDiv = document.createElement('div');
                gridDiv.className = 'numbers-grid';

                for (let i = start; i <= end; i++) {
                    const card = document.createElement('div');
                    card.className = 'number-card';
                    card.dataset.number = i;
                    card.innerHTML = `
                        <div class="number-numeral">${i}</div>
                        <div class="number-word">${numberToWords(i)}</div>
                    `;
                    card.addEventListener('click', () => speakNumber(i));
                    gridDiv.appendChild(card);
                }

                groupDiv.appendChild(gridDiv);
                container.appendChild(groupDiv);
            }
        };

        // Check if speech synthesis is available
        const isSpeechSynthesisAvailable = () => {
            return 'speechSynthesis' in window;
        };

        // Speak number
        const speakNumber = (num) => {
            const ttsEnabled = document.getElementById('ttsEnabled').checked;
            if (!ttsEnabled || !isSpeechSynthesisAvailable()) return;

            // Cancel any ongoing speech
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(numberToWords(num));
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;

            window.speechSynthesis.speak(utterance);

            // Visual feedback
            const card = document.querySelector(`.number-card[data-number="${num}"]`);
            if (card) {
                card.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    card.style.transform = '';
                }, 150);
            }
        };

        // Scroll to top functionality
        document.getElementById('scrollTop').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            generateNumbers();
        });
    </script>
</body>
</html>
